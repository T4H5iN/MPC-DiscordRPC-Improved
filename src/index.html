<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>MPC-DiscordRPC</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #1a1b1e;
            color: #e1e1e6;
            user-select: none;
        }

        h1 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            border-bottom: 1px solid #2c2d31;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-card {
            background: #25262b;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid #2c2d31;
        }

        .status-icon {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #5c5f66;
        }

        .status-icon.active {
            background-color: #40c057;
            box-shadow: 0 0 10px rgba(64, 192, 87, 0.4);
        }

        .status-icon.warning {
            background-color: #fab005;
            box-shadow: 0 0 10px rgba(250, 176, 5, 0.4);
        }

        .status-info {
            flex: 1;
        }

        .status-info h2 {
            margin: 0;
            font-size: 1rem;
            color: #fff;
        }

        .status-info p {
            margin: 5px 0 0;
            font-size: 0.85rem;
            color: #909296;
        }


        .controls {
            background: #25262b;
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #2c2d31;
        }

        .control-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .control-item:last-child {
            margin-bottom: 0;
        }

        button {
            background: #228be6;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s;
        }

        button:hover {
            background: #1c7ed6;
        }

        .log-box {
            margin-top: 20px;
            background: #141517;
            border-radius: 4px;
            padding: 10px;
            height: 120px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.8rem;
            color: #868e96;
            border: 1px solid #2c2d31;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1b1e;
        }

        ::-webkit-scrollbar-thumb {
            background: #2c2d31;
            border-radius: 4px;
        }

        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #25262b;
            padding: 24px;
            border-radius: 8px;
            width: 80%;
            max-width: 400px;
            border: 1px solid #2c2d31;
        }

        .modal-content h3 {
            margin: 0 0 15px;
            font-size: 1rem;
        }

        .modal-content input {
            width: 100%;
            padding: 10px;
            border: 1px solid #2c2d31;
            border-radius: 4px;
            background: #1a1b1e;
            color: #e1e1e6;
            font-size: 0.9rem;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .modal-content input:focus {
            outline: none;
            border-color: #228be6;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-actions button.cancel {
            background: #5c5f66;
        }

        .modal-actions button.cancel:hover {
            background: #4c4f56;
        }
    </style>
</head>

<body>
    <h1>
        MPC-DiscordRPC
        <span style="font-size: 0.8rem; color: #909296;">v0.1.0</span>
    </h1>

    <div class="status-card">
        <div id="statusIcon" class="status-icon"></div>
        <div class="status-info">
            <h2 id="statusTitle">Idle</h2>
            <p id="statusDetail">Waiting for MPC-HC...</p>
        </div>
    </div>

    <div class="controls">
        <div class="control-item">
            <span>Run on Startup</span>
            <input type="checkbox" id="startupToggle">
        </div>
        <div class="control-item">
            <span>App Version</span>
            <button id="updateBtn">Check for Updates</button>
        </div>
        <div class="control-item">
            <span>Window Close Action</span>
            <button id="resetCloseBtn">Reset Preference</button>
        </div>
    </div>

    <div class="log-box" id="logContainer">
        <div>[System] Dashboard initialized...</div>
    </div>



    <script>
        const { ipcRenderer } = require('electron');

        const statusTitle = document.getElementById('statusTitle');
        const statusDetail = document.getElementById('statusDetail');
        const statusIcon = document.getElementById('statusIcon');
        const logContainer = document.getElementById('logContainer');
        const startupToggle = document.getElementById('startupToggle');
        const updateBtn = document.getElementById('updateBtn');
        const resetCloseBtn = document.getElementById('resetCloseBtn');

        ipcRenderer.send('get-startup');

        ipcRenderer.on('get-startup-reply', (event, isEnabled) => {
            startupToggle.checked = isEnabled;
        });

        startupToggle.addEventListener('change', (e) => {
            ipcRenderer.send('toggle-startup', e.target.checked);
        });

        resetCloseBtn.addEventListener('click', () => {
            ipcRenderer.send('reset-close-action');
            alert('Window close preference reset.');
        });

        updateBtn.addEventListener('click', () => {
            ipcRenderer.send('check-update');
            log('Checking for updates...');
        });

        ipcRenderer.on('update-msg', (event, msg) => {
            log(msg);
            alert(msg);
        });

        ipcRenderer.on('rpc-log', (event, msg) => {
            log(msg);
        });

        ipcRenderer.on('rpc-status', (event, data) => {
            statusTitle.textContent = data.state;
            statusDetail.textContent = data.details || '';

            if (data.state === 'Idle' || data.state === 'Unknown') {
                statusIcon.classList.remove('active');
                statusIcon.classList.remove('warning');
            } else {
                statusIcon.classList.add('active');
                if (data.uncertain) {
                    statusIcon.classList.add('warning');
                } else {
                    statusIcon.classList.remove('warning');
                }
            }
        });



        function log(msg) {
            const div = document.createElement('div');
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logContainer.appendChild(div);
            logContainer.scrollTop = logContainer.scrollHeight;
        }
    </script>
</body>

</html>
